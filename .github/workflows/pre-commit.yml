name: Pre-commit

# Declare default permissions as read only.
permissions: read-all

on:
  merge_group:
  pull_request:
  push:
    branches: 'main'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5.0.0
      - name: Install keep-sorted
        run: |
          go install github.com/google/keep-sorted@v0.8.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - run: npm ci
      - run: npm run build
      - name: Test that BidiMapper can be imported
        run: node out/Default/gen/src/bidiMapper/BidiMapper.js
      - name: Run formatting and linting
        run: npm run format
      - name: Verify that codebase is fully formatted
        run: git diff --exit-code
