name: Pre-commit

# Declare default permissions as read only.
permissions: read-all

on:
  merge_group:
  pull_request:
  push:
    branches: 'main'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.0.0
      - name: Install keep-sorted
        run: |
          go install github.com/google/keep-sorted@v0.8.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - run: npm ci
      - run: npm run build
      - name: Test that BidiMapper can be imported
        run: node out/Default/gen/src/bidiMapper/BidiMapper.js
      - name: Run formatting and linting
        run: npm run format
      - name: Verify that codebase is fully formatted
        run: git diff --exit-code
