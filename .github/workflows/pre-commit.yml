name: Pre-commit

# Declare default permissions as read only.
permissions: read-all

on:
  merge_group:
  pull_request:
  push:
    branches: 'main'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v5.0.0
      - name: Install keep-sorted
        run: |
          go install github.com/google/keep-sorted@v0.8.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - run: npm run build
      - name: Test that BidiMapper can be imported
        run: ./tools/node.py out/Default/gen/src/bidiMapper/BidiMapper.js
      - name: Run formatting and linting
        run: npm run format
      - name: Verify that codebase is fully formatted
        run: git diff --exit-code
