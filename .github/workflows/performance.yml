# This workflow will run measure performance in different environments.

name: Run performance benchmarks

# Declare default permissions as read only.
permissions: read-all

env:
  DEBUG: 'bidi:server:*,bidi:mapper:*'
  DEBUG_DEPTH: 10
  FORCE_COLOR: 3
  PIP_DISABLE_PIP_VERSION_CHECK: 1

on:
  push:
    branches: 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  puppeteer-perf-metric:
    name: Puppeteer ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO(#876): Add Windows CI.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Disable AppArmor
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - name: Install and build npm dependencies
        run: npm ci
      # Install chrome, chromedriver and headless shell is required to keep them cached.
      - name: Install all chrome binaries if needed
        uses: ./.github/actions/setup-chrome-binaries
      - name: Build chromium-bidi
        run: npm run build
      - name: Install Puppeteer
        # Use specific Puppeteer version for result consistency.
        run: npm install puppeteer@25.1.0
      - name: Link chromium-bidi
        run: |
          npm link
          npm link chromium-bidi
      - name: Run JS performance benchmark
        env:
          METRICS_JSON_FILE: puppeteer_perf_metrics.json
          OS: ${{ matrix.os }}
          # Reduce runs on macOS to balance execution time and flakiness,
          # while maintaining sufficient signal for performance monitoring.
          RUNS: ${{ matrix.os == 'macos-latest' && 10 || 100 }}
          ITERATIONS: 100
        run: |
          DEBUG_CDP_DATA=debug.cdp.log DEBUG_BIDI_DATA=debug.bidi.log node tools/benchmark-puppeteer.mjs
          cat puppeteer_perf_metrics.json
      - name: Upload performance result as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: puppeteer-perf-metrics-${{ matrix.os }}
          path: |
            puppeteer_perf_metrics.json
            debug.cdp.log
            debug.bidi.log
          # Do not store these artifacts for long, as they will be present in the `all-performance-metrics`.
          retention-days: 1
  selenium-perf-metric:
    name: Selenium ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO(#876): Add Windows CI.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Disable AppArmor
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - name: Install and build npm dependencies
        run: npm ci
      # Install chrome, chromedriver and headless shell is required to keep them cached.
      - name: Install all chrome binaries if needed
        uses: ./.github/actions/setup-chrome-binaries
      - name: Build chromium-bidi
        run: npm run build
      - name: Run JS performance benchmark
        env:
          METRICS_JSON_FILE: selenium_perf_metrics.json
          HEAD: ${{ matrix.head }}
          RUNNER: ${{ matrix.kind }}
          OS: ${{ matrix.os }}
          # Precise metrics are not required; a general impression is sufficient.
          RUNS: 10
          ITERATIONS: 100
        run: |
          node tools/benchmark-selenium.mjs
          cat selenium_perf_metrics.json
      - name: Upload performance result as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: selenium-perf-metrics-${{ matrix.os }}
          path: |
            selenium_perf_metrics.json
          # Do not store these artifacts for long, as they will be present in the `all-performance-metrics`.
          retention-days: 1
  e2e-perf-metric:
    name: E2e ${{ matrix.kind }}-${{ matrix.os }}-${{ matrix.head }}
    strategy:
      fail-fast: false
      matrix:
        # TODO(#876): Add Windows CI.
        os: [ubuntu-latest, macos-latest]
        head: [headful, 'new-headless', 'old-headless']
        # `cd` runs e2e via `chromedriver`. `node` runs tests using `NodeJS` runner.
        kind: [cd, node]
        exclude:
          - os: ubuntu-latest
            head: headful
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Disable AppArmor
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - name: Sync dependencies
        run: bash tools/gclient-sync.sh
      - name: Generate Ninja config
        run: npm run gn:gen
      - name: Install and build npm dependencies
        run: npm ci
      # Install chrome, chromedriver and headless shell is required to keep them cached.
      - name: Install all chrome binaries if needed
        uses: ./.github/actions/setup-chrome-binaries
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pipenv
      - name: Install pipenv
        run: pip install pipenv
      - name: Install python dependencies
        run: pipenv install
      - name: Run E2E performance tests
        timeout-minutes: 20
        env:
          CHROMEDRIVER: ${{ matrix.kind == 'cd' }}
          METRICS_JSON_FILE: e2e_perf_metrics.json
          # Reduce runs on macOS to balance execution time and flakiness,
          # while maintaining sufficient signal for performance monitoring.
          ITERATIONS: ${{ matrix.os == 'macos-latest' && 5 || 15 }}
          OS: ${{ matrix.os }}
          HEAD: ${{ matrix.head }}
          RUNNER: ${{ matrix.kind }}
        run: |
          npm run e2e:${{ matrix.head }} -- tests/performance/ -s
          cat e2e_perf_metrics.json
      - name: Upload performance result as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-perf-metrics-${{ matrix.os }}-${{ matrix.head }}-${{ matrix.kind }}
          path: e2e_perf_metrics.json
          # Do not store these artifacts for long, as they will be present in the `all-performance-metrics`.
          retention-days: 1
  combine_metrics:
    if: ${{ !cancelled() }}
    name: Combine performance metrics
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      deployments: write
      # Add perf metrics to PR's comment
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    needs: [puppeteer-perf-metric, selenium-perf-metric, e2e-perf-metric]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Download all performance metrics artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Combine metrics into a single file
        run: |
          echo "[" > performance-metrics-all.json

          find artifacts -name "*metrics.json" -exec cat {} + >> performance-metrics-all.json

          # The metrics files have a trailing comma, but JSON does not allow it in the list.
          # Remove the last comma when combining metrics together.
          sed -i '$ s/,$//' performance-metrics-all.json

          echo "]" >> performance-metrics-all.json
          echo "Combined performance metrics in JSON format:"
          cat performance-metrics-all.json
      - name: Upload combined performance metrics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: all-performance-metrics
          path: |
            performance-metrics-all.json
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: performance-metrics-all.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Comment only when run in PR.
          comment-always: ${{ github.ref != 'refs/heads/main' }}
          # Push and deploy automatically on merge to main.
          auto-push: ${{ github.ref == 'refs/heads/main' }}
